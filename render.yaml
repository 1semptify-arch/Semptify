# Render.com Blueprint
# Deploy with: https://render.com/docs/blueprint-spec

services:
  # ---------------------------------------------------------------------------
  # Semptify 5.0 — Web Service
  # Deploys via Docker. No build.sh needed.
  # See ADDONS_INVENTORY.md for product family map.
  # ---------------------------------------------------------------------------
  - type: web
    name: semptify-api
    runtime: docker
    region: oregon
    plan: free
    branch: main
    dockerfilePath: ./Dockerfile

    # Health Check
    healthCheckPath: /health

    # Auto Deploy on Push
    autoDeploy: true

    # Environment Variables
    # IMPORTANT: Set sync:false values in Render Dashboard > Environment
    # Never put real secrets in this file — it lives in your git repo
    envVars:
      # ---------------------------------------------------------------------
      # Core
      # ---------------------------------------------------------------------
      - key: SECRET_KEY
        generateValue: true

      - key: SECURITY_MODE
        value: enforced

      - key: LOG_LEVEL
        value: INFO

      - key: PYTHONUNBUFFERED
        value: "1"

      # ---------------------------------------------------------------------
      # Database
      # Use Neon (neon.tech) or Supabase — both free forever, no expiry.
      # Create a free DB, copy the connection string, paste it in
      # Render Dashboard > Environment > DATABASE_URL
      # Format: postgresql+asyncpg://user:pass@host/dbname
      # ---------------------------------------------------------------------
      - key: DATABASE_URL
        sync: false

      # ---------------------------------------------------------------------
      # OAuth — Cloud Storage Providers
      # Set all of these in Render Dashboard > Environment
      # ---------------------------------------------------------------------
      - key: GOOGLE_DRIVE_CLIENT_ID
        sync: false
      - key: GOOGLE_DRIVE_CLIENT_SECRET
        sync: false
      - key: DROPBOX_APP_KEY
        sync: false
      - key: DROPBOX_APP_SECRET
        sync: false
      - key: ONEDRIVE_CLIENT_ID
        sync: false
      - key: ONEDRIVE_CLIENT_SECRET
        sync: false

      # ---------------------------------------------------------------------
      # Cloudflare R2 — System Storage (set in Render Dashboard)
      # ---------------------------------------------------------------------
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        value: semptify-system
      - key: R2_ENDPOINT
        sync: false

      # ---------------------------------------------------------------------
      # Email — Transactional (Resend recommended — resend.com)
      # Set RESEND_API_KEY in Render Dashboard > Environment (never in git)
      # FROM_EMAIL must be a verified domain address in your Resend account
      # ---------------------------------------------------------------------
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        value: noreply@semptify.org
      - key: SUPPORT_EMAIL
        value: support@semptify.org

# NOTE: No databases block here intentionally.
# Use Neon (neon.tech) — free PostgreSQL with no 90-day expiry.
# Render's free PostgreSQL deletes data after 90 days.
