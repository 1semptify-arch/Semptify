# =============================================================================
# Semptify FastAPI - Docker Compose
# =============================================================================
# Local development and production deployment configuration
#
# Development: docker-compose up
# Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Semptify API
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: semptify-api
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://semptify:semptify@postgres:5432/semptify
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - SECURITY_MODE=${SECURITY_MODE:-open}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GOOGLE_DRIVE_CLIENT_ID=${GOOGLE_DRIVE_CLIENT_ID:-}
      - GOOGLE_DRIVE_CLIENT_SECRET=${GOOGLE_DRIVE_CLIENT_SECRET:-}
      - DROPBOX_APP_KEY=${DROPBOX_APP_KEY:-}
      - DROPBOX_APP_SECRET=${DROPBOX_APP_SECRET:-}
      - ONEDRIVE_CLIENT_ID=${ONEDRIVE_CLIENT_ID:-}
      - ONEDRIVE_CLIENT_SECRET=${ONEDRIVE_CLIENT_SECRET:-}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - semptify-network

  # ---------------------------------------------------------------------------
  # PostgreSQL Database (local dev only — use Neon/Supabase in production)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: semptify-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=semptify
      - POSTGRES_PASSWORD=semptify
      - POSTGRES_DB=semptify
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U semptify -d semptify"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - semptify-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres-data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  semptify-network:
    driver: bridge
