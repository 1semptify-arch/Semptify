[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    core_gate: Mandatory core completion gate tests (Sprint 1)
    security_gate: Mandatory security isolation gate tests (Sprint 2)
    action_gate: Mandatory action router gate tests (Sprint 3)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage settings
addopts = --cov=app --cov-report=term-missing --cov-report=html --cov-fail-under=0
