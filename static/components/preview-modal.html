<!-- Document Preview Modal Component -->
<!-- Usage: Include this in any page that needs document preview -->
<!-- Call: openPreviewModal(documentId, filename, mimeType) -->

<div id="preview-modal" class="preview-modal">
    <div class="preview-modal__backdrop" onclick="closePreviewModal()"></div>
    <div class="preview-modal__container">
        <div class="preview-modal__header">
            <h3 class="preview-modal__title" id="preview-title">Document Preview</h3>
            <div class="preview-modal__actions">
                <button class="preview-modal__btn" onclick="downloadPreviewDocument()" title="Download">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </button>
                <button class="preview-modal__btn preview-modal__btn--close" onclick="closePreviewModal()" title="Close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>
        
        <div class="preview-modal__content" id="preview-content">
            <div class="preview-modal__loading" id="preview-loading">
                <div class="preview-modal__spinner"></div>
                <p>Loading preview...</p>
            </div>
            
            <div class="preview-modal__error" id="preview-error" style="display: none;">
                <p>Failed to load preview</p>
            </div>
            
            <!-- Image Preview -->
            <img id="preview-image" class="preview-modal__image" style="display: none;" alt="Document preview">
            
            <!-- PDF Preview -->
            <iframe id="preview-pdf" class="preview-modal__pdf" style="display: none;"></iframe>
            
            <!-- Text Preview -->
            <pre id="preview-text" class="preview-modal__text" style="display: none;"></pre>
            
            <!-- Placeholder for unsupported types -->
            <div id="preview-placeholder" class="preview-modal__placeholder" style="display: none;">
                <div class="preview-modal__placeholder-icon">📄</div>
                <p>Preview not available for this file type</p>
                <button class="preview-modal__download-btn" onclick="downloadPreviewDocument()">
                    Download to View
                </button>
            </div>
        </div>
        
        <div class="preview-modal__footer">
            <span class="preview-modal__meta" id="preview-meta"></span>
        </div>
    </div>
</div>

<style>
.preview-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 1000;
    align-items: center;
    justify-content: center;
}

.preview-modal.active {
    display: flex;
}

.preview-modal__backdrop {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(4px);
}

.preview-modal__container {
    position: relative;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    width: 90%;
    max-width: 900px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.preview-modal__header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid #e5e7eb;
    background: #f9fafb;
}

.preview-modal__title {
    font-size: 1rem;
    font-weight: 600;
    margin: 0;
    color: #111827;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 60%;
}

.preview-modal__actions {
    display: flex;
    gap: 0.5rem;
}

.preview-modal__btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border: none;
    background: #fff;
    border-radius: 8px;
    cursor: pointer;
    color: #6b7280;
    transition: all 0.15s;
}

.preview-modal__btn:hover {
    background: #f3f4f6;
    color: #111827;
}

.preview-modal__btn--close:hover {
    background: #fee2e2;
    color: #dc2626;
}

.preview-modal__content {
    flex: 1;
    overflow: auto;
    min-height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f3f4f6;
}

.preview-modal__loading {
    text-align: center;
    color: #6b7280;
}

.preview-modal__spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #e5e7eb;
    border-top-color: #3b82f6;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 1rem;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

.preview-modal__image {
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
}

.preview-modal__pdf {
    width: 100%;
    height: 70vh;
    border: none;
}

.preview-modal__text {
    width: 100%;
    max-height: 70vh;
    padding: 1.5rem;
    background: #fff;
    font-family: 'Courier New', monospace;
    font-size: 0.875rem;
    line-height: 1.6;
    overflow: auto;
    white-space: pre-wrap;
    word-wrap: break-word;
    margin: 0;
}

.preview-modal__placeholder {
    text-align: center;
    padding: 3rem;
}

.preview-modal__placeholder-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
}

.preview-modal__download-btn {
    margin-top: 1rem;
    padding: 0.75rem 1.5rem;
    background: #3b82f6;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
}

.preview-modal__download-btn:hover {
    background: #2563eb;
}

.preview-modal__footer {
    padding: 0.75rem 1.25rem;
    border-top: 1px solid #e5e7eb;
    background: #f9fafb;
}

.preview-modal__meta {
    font-size: 0.8rem;
    color: #6b7280;
}

.preview-modal__error {
    text-align: center;
    color: #dc2626;
    padding: 2rem;
}

/* Responsive */
@media (max-width: 640px) {
    .preview-modal__container {
        width: 95%;
        max-height: 95vh;
    }
    
    .preview-modal__title {
        max-width: 50%;
    }
}
</style>

<script>
// Current document being previewed
let currentPreviewDoc = null;

/**
 * Open the preview modal for a document
 * @param {string} documentId - Document ID
 * @param {string} filename - Document filename
 * @param {string} mimeType - MIME type (optional)
 */
function openPreviewModal(documentId, filename, mimeType = null) {
    currentPreviewDoc = { documentId, filename, mimeType };
    
    const modal = document.getElementById('preview-modal');
    const title = document.getElementById('preview-title');
    const loading = document.getElementById('preview-loading');
    const error = document.getElementById('preview-error');
    const image = document.getElementById('preview-image');
    const pdf = document.getElementById('preview-pdf');
    const text = document.getElementById('preview-text');
    const placeholder = document.getElementById('preview-placeholder');
    const meta = document.getElementById('preview-meta');
    
    // Reset state
    loading.style.display = 'block';
    error.style.display = 'none';
    image.style.display = 'none';
    pdf.style.display = 'none';
    text.style.display = 'none';
    placeholder.style.display = 'none';
    
    // Set title
    title.textContent = filename || 'Document Preview';
    meta.textContent = 'Loading...';
    
    // Show modal
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
    
    // Load preview
    loadPreview(documentId, filename, mimeType);
}

/**
 * Close the preview modal
 */
function closePreviewModal() {
    const modal = document.getElementById('preview-modal');
    modal.classList.remove('active');
    document.body.style.overflow = '';
    
    // Clear content
    const image = document.getElementById('preview-image');
    const pdf = document.getElementById('preview-pdf');
    const text = document.getElementById('preview-text');
    
    image.src = '';
    pdf.src = '';
    text.textContent = '';
    
    currentPreviewDoc = null;
}

/**
 * Load preview content
 */
async function loadPreview(documentId, filename, mimeType) {
    const loading = document.getElementById('preview-loading');
    const error = document.getElementById('preview-error');
    const image = document.getElementById('preview-image');
    const pdf = document.getElementById('preview-pdf');
    const text = document.getElementById('preview-text');
    const placeholder = document.getElementById('preview-placeholder');
    const meta = document.getElementById('preview-meta');
    
    try {
        // Determine preview type from mime type or extension
        const isImage = mimeType?.startsWith('image/') || 
                       filename?.match(/\.(jpg|jpeg|png|gif|webp)$/i);
        const isPDF = mimeType === 'application/pdf' || 
                     filename?.toLowerCase().endsWith('.pdf');
        const isText = mimeType?.startsWith('text/') || 
                      filename?.match(/\.(txt|md|csv)$/i);
        
        if (isImage) {
            // Load image preview
            const response = await fetch(`/api/documents/${documentId}/download`);
            if (!response.ok) throw new Error('Failed to load image');
            
            const blob = await response.blob();
            image.src = URL.createObjectURL(blob);
            image.style.display = 'block';
            loading.style.display = 'none';
            meta.textContent = `${filename} • Image`;
            
        } else if (isPDF) {
            // Load PDF preview
            pdf.src = `/api/documents/${documentId}/preview/pdf`;
            pdf.style.display = 'block';
            loading.style.display = 'none';
            meta.textContent = `${filename} • PDF Document`;
            
        } else if (isText) {
            // Load text preview
            const response = await fetch(`/api/preview/${documentId}/text`);
            if (!response.ok) throw new Error('Failed to load text');
            
            const content = await response.text();
            text.textContent = content;
            text.style.display = 'block';
            loading.style.display = 'none';
            meta.textContent = `${filename} • Text Document`;
            
        } else {
            // Unsupported type - show placeholder
            loading.style.display = 'none';
            placeholder.style.display = 'block';
            meta.textContent = `${filename} • ${mimeType || 'Unknown type'}`;
        }
        
    } catch (err) {
        console.error('Preview error:', err);
        loading.style.display = 'none';
        error.style.display = 'block';
        meta.textContent = 'Error loading preview';
    }
}

/**
 * Download the current document
 */
function downloadPreviewDocument() {
    if (!currentPreviewDoc) return;
    
    const { documentId, filename } = currentPreviewDoc;
    const link = document.createElement('a');
    link.href = `/api/documents/${documentId}/download`;
    link.download = filename || 'document';
    link.click();
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        closePreviewModal();
    }
});

// Close on backdrop click (delegated)
document.addEventListener('click', (e) => {
    if (e.target.classList.contains('preview-modal__backdrop')) {
        closePreviewModal();
    }
});
</script>
