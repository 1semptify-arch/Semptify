<!--
  MAIN NAVIGATION COMPONENT - Semptify GUI Framework
  
  MANDATORY: This navigation structure MUST be used on all Semptify pages.
  
  Five Core Links:
  - Home: Main entry point and dashboard
  - Library: Law library and resources
  - Office: Document management and tools
  - Tools: Utility functions and features
  - Help: Support and guidance
  
  Usage:
  - Static HTML: Include this file or copy the nav structure
  - Jinja2 Templates: Extends base_ssot.html (includes this automatically)
  
  DO NOT MODIFY the link structure without architecture review.
-->

<nav class="main-nav" role="navigation" aria-label="Main Navigation">
  <div class="nav-container">
    <!-- Brand/Logo -->
    <a href="/" class="nav-brand" aria-label="Semptify Home">
      <span class="nav-logo">⚖️</span>
      <span class="nav-title">Semptify</span>
    </a>
    
    <!-- Core Navigation Links - MANDATORY 5-ITEM STRUCTURE -->
    <ul class="nav-links" role="menubar">
      <li class="nav-item" role="none">
        <a href="/" 
           class="nav-link" 
           role="menuitem"
           {% if active_nav == 'home' %}aria-current="page"{% endif %}
           data-nav="home">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Home</span>
        </a>
      </li>
      
      <li class="nav-item" role="none">
        <a href="/law-library" 
           class="nav-link" 
           role="menuitem"
           {% if active_nav == 'library' %}aria-current="page"{% endif %}
           data-nav="library">
          <span class="nav-icon">📚</span>
          <span class="nav-label">Library</span>
        </a>
      </li>
      
      <li class="nav-item" role="none">
        <a href="/office" 
           class="nav-link" 
           role="menuitem"
           {% if active_nav == 'office' %}aria-current="page"{% endif %}
           data-nav="office">
          <span class="nav-icon">🏢</span>
          <span class="nav-label">Office</span>
        </a>
      </li>
      
      <li class="nav-item" role="none">
        <a href="/tools" 
           class="nav-link" 
           role="menuitem"
           {% if active_nav == 'tools' %}aria-current="page"{% endif %}
           data-nav="tools">
          <span class="nav-icon">🧰</span>
          <span class="nav-label">Tools</span>
        </a>
      </li>
      
      <li class="nav-item" role="none">
        <a href="/help" 
           class="nav-link" 
           role="menuitem"
           {% if active_nav == 'help' %}aria-current="page"{% endif %}
           data-nav="help">
          <span class="nav-icon">❓</span>
          <span class="nav-label">Help</span>
        </a>
      </li>
    </ul>
    
    <!-- Optional: Contextual Actions (role-specific) -->
    <div class="nav-actions" id="navActions">
      <!-- Injected via JavaScript based on user context -->
    </div>
    
    <!-- Mobile Menu Toggle -->
    <button class="nav-toggle" 
            aria-label="Toggle navigation menu"
            aria-expanded="false"
            aria-controls="nav-links"
            onclick="toggleMainNav()">
      <span class="toggle-bar"></span>
      <span class="toggle-bar"></span>
      <span class="toggle-bar"></span>
    </button>
  </div>
  
  <!-- Mobile Navigation Menu -->
  <div class="nav-mobile" id="navMobile" hidden>
    <ul class="nav-mobile-links">
      <li><a href="/" data-nav="home">🏠 Home</a></li>
      <li><a href="/law-library" data-nav="library">📚 Library</a></li>
      <li><a href="/office" data-nav="office">🏢 Office</a></li>
      <li><a href="/tools" data-nav="tools">🧰 Tools</a></li>
      <li><a href="/help" data-nav="help">❓ Help</a></li>
    </ul>
  </div>
</nav>

<script>
  // Main Navigation JavaScript
  (function() {
    'use strict';
    
    // Highlight current page in navigation
    function highlightCurrentNav() {
      const currentPath = window.location.pathname;
      const navLinks = document.querySelectorAll('.nav-link, .nav-mobile-links a');
      
      navLinks.forEach(link => {
        const href = link.getAttribute('href');
        if (href === currentPath || currentPath.startsWith(href + '/')) {
          link.classList.add('active');
          link.setAttribute('aria-current', 'page');
        } else {
          link.classList.remove('active');
          link.removeAttribute('aria-current');
        }
      });
    }
    
    // Toggle mobile navigation
    window.toggleMainNav = function() {
      const toggle = document.querySelector('.nav-toggle');
      const mobile = document.getElementById('navMobile');
      const isExpanded = toggle.getAttribute('aria-expanded') === 'true';
      
      toggle.setAttribute('aria-expanded', !isExpanded);
      mobile.hidden = isExpanded;
    };
    
    // Initialize on load
    document.addEventListener('DOMContentLoaded', highlightCurrentNav);
    
    // Update on navigation (for SPAs)
    window.addEventListener('popstate', highlightCurrentNav);
  })();
</script>
