{# Loading Overlay Component #}
{# Usage: Include this component anywhere you need a loading state #}
{# <div class="loading-overlay" id="loadingOverlay" style="display: none;">...</div> #}

<style>
.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(26, 26, 46, 0.9);
    backdrop-filter: blur(4px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    transition: opacity 0.3s ease;
}

.loading-overlay.hidden {
    display: none;
    opacity: 0;
    pointer-events: none;
}

.loading-spinner {
    width: 56px;
    height: 56px;
    border: 4px solid rgba(255, 255, 255, 0.1);
    border-top-color: var(--color-accent, #3b82f6);
    border-radius: 50%;
    animation: loading-spin 1s linear infinite;
}

@keyframes loading-spin {
    to { transform: rotate(360deg); }
}

.loading-text {
    margin-top: 1.5rem;
    color: var(--color-text-secondary, #94a3b8);
    font-size: 0.875rem;
    text-align: center;
}

.loading-text strong {
    color: var(--color-text-primary, #ffffff);
    display: block;
    margin-bottom: 0.25rem;
    font-size: 1rem;
}

/* Inline spinner variant */
.spinner-inline {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    color: var(--color-text-secondary, #94a3b8);
    font-size: 0.875rem;
}

.spinner-inline .spinner {
    width: 20px;
    height: 20px;
    border-width: 2px;
}

/* Button loading state */
.btn--loading {
    position: relative;
    color: transparent !important;
    pointer-events: none;
}

.btn--loading::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 20px;
    height: 20px;
    margin-top: -10px;
    margin-left: -10px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: currentColor;
    border-radius: 50%;
    animation: loading-spin 1s linear infinite;
}
</style>

<div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">
        <strong id="loadingTitle">Loading...</strong>
        <span id="loadingMessage">Please wait</span>
    </div>
</div>

<script>
// Loading overlay controller
window.LoadingOverlay = {
    show: function(title, message) {
        const overlay = document.getElementById('loadingOverlay');
        const titleEl = document.getElementById('loadingTitle');
        const messageEl = document.getElementById('loadingMessage');
        
        if (title) titleEl.textContent = title;
        if (message) messageEl.textContent = message;
        
        overlay.classList.remove('hidden');
    },
    
    hide: function() {
        const overlay = document.getElementById('loadingOverlay');
        overlay.classList.add('hidden');
    },
    
    // Button loading helper
    setButtonLoading: function(button, loading = true) {
        if (loading) {
            button.classList.add('btn--loading');
            button.disabled = true;
        } else {
            button.classList.remove('btn--loading');
            button.disabled = false;
        }
    }
};

// Auto-show on form submissions
document.addEventListener('submit', function(e) {
    const form = e.target;
    if (form.dataset.loading !== 'false') {
        const submitBtn = form.querySelector('button[type="submit"], input[type="submit"]');
        if (submitBtn) {
            LoadingOverlay.setButtonLoading(submitBtn, true);
        }
    }
});
</script>
